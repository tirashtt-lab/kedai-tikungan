    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh; /* mengikuti tinggi layar aktual di HP, termasuk saat address bar muncul/hilang */
        overflow-x: hidden;
      }
      #root {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      /* Pastikan konten tidak "kepotong" atau kekecilan di layar lebar (PC/tablet landscape) */
      @media (min-width: 768px) {
        #root {
          max-width: 100vw;
        }
      }
      /* Perbaikan khusus saat HP diputar ke landscape dengan tinggi layar pendek */
      @media (orientation: landscape) and (max-height: 500px) {
        #root { min-height: 100dvh; }
      }
    </style>

        return el;
      }

      function hideLoader(el) {
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }

      async function pullFromSupabase() {
        const { data, error } = await supabase.from(TABLE).select("key,value");
        if (error) {
          console.error("[xyzpos-sync] gagal ambil data dari Supabase:", error.message);
          return;
        }
        if (!data) return;
        for (const row of data) {
          try {
            localStorage.setItem(row.key, JSON.stringify(row.value));
          } catch (e) {
            console.error("[xyzpos-sync] gagal tulis ke localStorage:", row.key, e);
          }
        }
        console.log(`[xyzpos-sync] ${data.length} key berhasil disinkron dari Supabase.`);
      }

      const pendingPush = new Map();
      const PUSH_DEBOUNCE_MS = 800;

      function schedulePush(key, rawValue) {
        if (pendingPush.has(key)) clearTimeout(pendingPush.get(key));
        const timer = setTimeout(async () => {
          pendingPush.delete(key);
          let parsed;
          try {
            parsed = JSON.parse(rawValue);
          } catch {
            parsed = rawValue;
          }
          const { error } = await supabase
            .from(TABLE)
            .upsert({ key, value: parsed, updated_at: new Date().toISOString() }, { onConflict: "key" });
          if (error) {
            console.error(`[xyzpos-sync] gagal kirim "${key}" ke Supabase:`, error.message);
          } else {
            console.log(`[xyzpos-sync] "${key}" tersinkron ke Supabase.`);
          }
        }, PUSH_DEBOUNCE_MS);
        pendingPush.set(key, timer);
      }

      function patchLocalStorage() {
        const originalSetItem = localStorage.setItem.bind(localStorage);
        localStorage.setItem = function (key, value) {
          originalSetItem(key, value);
          if (key.startsWith("xyzpos_")) {
            schedulePush(key, value);
          }
        };
      }

      function runMainApp() {
        const codeEl = document.getElementById("xyzpos-app-code");
        const s = document.createElement("script");
        s.type = "module";
        s.textContent = codeEl.textContent;
        document.body.appendChild(s);
        codeEl.remove();
      }

      async function boot() {
        const loader = showLoader();
        try {
          await pullFromSupabase();
        } finally {
          patchLocalStorage();
          hideLoader(loader);
          runMainApp();
        }
      }

      boot();
    </script>

    <script>
      // Paksa komponen yang mengandalkan window resize (grafik, tabel, dll)
      // untuk menyesuaikan ukuran setiap kali orientasi layar berubah.
      function triggerResize() {
        window.dispatchEvent(new Event('resize'));
      }
      if (screen.orientation && screen.orientation.addEventListener) {
        screen.orientation.addEventListener('change', () => setTimeout(triggerResize, 100));
      } else {
        window.addEventListener('orientationchange', () => setTimeout(triggerResize, 100));
      }
    </script>

    <!-- Tombol Install App: muncul otomatis di Chrome/Edge (PC, Android, ChromeOS, tablet Android) -->
    <button id="xyzpos-install-btn" style="
      display:none; position:fixed; right:16px; bottom:16px; z-index:999998;
      background:#2563eb; color:#fff; border:none; border-radius:9999px;
      padding:12px 20px; font:600 14px system-ui,sans-serif; box-shadow:0 4px 14px rgba(0,0,0,.2);
      cursor:pointer; align-items:center; gap:8px;">
      ⬇️ Install App
    </button>

    <script>
      (function () {
        let deferredPrompt = null;
        const btn = document.getElementById('xyzpos-install-btn');

        // Chrome/Edge/Android/ChromeOS: event ini menandakan app bisa diinstal
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredPrompt = e;
          btn.style.display = 'flex';
        });

        btn.addEventListener('click', async () => {
          if (deferredPrompt) {
            btn.style.display = 'none';
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
          } else {
            // iOS Safari / browser lain tanpa dukungan beforeinstallprompt
            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            if (isIOS) {
              alert('Untuk instal di iPhone/iPad:\n1. Tap tombol Share (kotak dengan panah ke atas)\n2. Pilih "Add to Home Screen" / "Tambah ke Layar Utama"');
            } else {
              alert('Buka menu browser (⋮ atau ...) lalu pilih "Install App" / "Add to Home Screen".');
            }
          }
        });

        // Sembunyikan tombol kalau app sudah berjalan sebagai PWA terinstal
        window.addEventListener('appinstalled', () => {
          btn.style.display = 'none';
          deferredPrompt = null;
        });
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
          btn.style.display = 'none';
        }
      })();
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registered successfully!', reg.scope))
            .catch((err) => console.error('Service Worker registration failed (opsional, bisa diabaikan jika file ini dibuka mandiri):', err));
        });
      }
    </script>
